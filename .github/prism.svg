<svg xmlns="http://www.w3.org/2000/svg" width="72" height="52" viewBox="0 0 72 52" role="img" aria-label="white light passing through a glass square-pyramid and breaking into a pastel spectrum">
  <defs>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#bfeaff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#6f9bff" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8fe6ff"/>
      <stop offset="1" stop-color="#6aa6ff"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="0.85" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- transparent glass: two front faces + the base square -->
  <polygon points="24,6 6,34 24,43" fill="url(#glass)"/>
  <polygon points="24,6 42,34 24,43" fill="url(#glass)" fill-opacity="0.7"/>
  <polygon points="24,43 6,34 24,25 42,34" fill="url(#glass)" fill-opacity="0.4"/>

  <!-- thin light-line edges: ridges + front base edges -->
  <g fill="none" stroke="url(#edge)" stroke-width="0.9" stroke-linejoin="round" stroke-linecap="round" filter="url(#glow)">
    <line x1="24" y1="6" x2="6" y2="34"/>
    <line x1="24" y1="6" x2="42" y2="34"/>
    <line x1="24" y1="6" x2="24" y2="43"/>
    <line x1="24" y1="43" x2="6" y2="34"/>
    <line x1="24" y1="43" x2="42" y2="34"/>
  </g>
  <!-- far edges of the base square (fainter, for depth) -->
  <g fill="none" stroke="url(#edge)" stroke-width="0.8" stroke-linecap="round" opacity="0.45" filter="url(#glow)">
    <line x1="6" y1="34" x2="24" y2="25"/>
    <line x1="42" y1="34" x2="24" y2="25"/>
  </g>

  <!-- white light: incoming, then through the glass to the exit face -->
  <line x1="0" y1="24" x2="12" y2="24" stroke="#eef9ff" stroke-width="1.6" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="12" y1="24" x2="37" y2="26" stroke="#eef9ff" stroke-width="1.2" stroke-linecap="round" opacity="0.85" filter="url(#glow)"/>

  <!-- pastel spectrum: thin, uneven widths, breaking at the exit face -->
  <g fill="none" stroke-linecap="round" filter="url(#glow)">
    <line x1="37" y1="26" x2="72" y2="15" stroke="#ff9aa6" stroke-width="1.3"/>
    <line x1="37" y1="26" x2="72" y2="20" stroke="#ffc9a3" stroke-width="0.8"/>
    <line x1="37" y1="26" x2="72" y2="24" stroke="#fbf0a6" stroke-width="1.1"/>
    <line x1="37" y1="26" x2="72" y2="28" stroke="#b7ecc8" stroke-width="0.8"/>
    <line x1="37" y1="26" x2="72" y2="32" stroke="#a9d6ff" stroke-width="1.0"/>
    <line x1="37" y1="26" x2="72" y2="37" stroke="#cbb8ff" stroke-width="1.3"/>
  </g>

  <!-- glowing dots at each vertex of the pyramid -->
  <g fill="#d4f3ff" filter="url(#glow)">
    <circle cx="24" cy="6" r="1.25"/>
    <circle cx="6" cy="34" r="1.25"/>
    <circle cx="42" cy="34" r="1.25"/>
    <circle cx="24" cy="43" r="1.25"/>
    <circle cx="24" cy="25" r="1.05" opacity="0.7"/>
  </g>
</svg>
