\* SAFE configuration: single-member, leader-driven reconfiguration.
\* Expected: AtMostOneLeader AND NoTokenRegression both hold — no split-brain and no fencing
\* regression across reconfigurations.
\* Run:  java -cp tla2tools.jar tlc2.TLC SelfElectingQuorum.tla -config SelfElectingQuorum.cfg

CONSTANTS
  Nodes = {n1, n2, n3, n4, n5}
  Owners = {a, b}
  NONE = NONE
  MaxEpoch = 3
  MinQuorum = 3
  ReconfigDelta = 1
  LeaderDriven = TRUE

SPECIFICATION Spec

INVARIANT TypeOK
INVARIANT AtMostOneLeader
INVARIANT NoTokenRegression
