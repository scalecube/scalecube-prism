\* NECESSITY OF LEADER-DRIVEN RECONFIGURATION (fencing monotonicity).
\* Single-member (ReconfigDelta = 1) but LeaderDriven = FALSE — an unconstrained config swap.
\* Expected: AtMostOneLeader still holds, but TLC reports a counterexample to NoTokenRegression:
\* a config shrink drops below a stale, still-valid, lower-epoch lease's majority and resurrects it,
\* regressing the fencing token. This shows single-member alone is not enough — reconfiguration must
\* be leader-driven (carry the high-water onto a majority of the new config).
\* Run:  java -cp tla2tools.jar tlc2.TLC SelfElectingQuorum.tla -config SelfElectingQuorum_nofence.cfg

CONSTANTS
  Nodes = {n1, n2, n3, n4, n5}
  Owners = {a, b}
  NONE = NONE
  MaxEpoch = 3
  MinQuorum = 3
  ReconfigDelta = 1
  LeaderDriven = FALSE

SPECIFICATION Spec

INVARIANT TypeOK
INVARIANT AtMostOneLeader
INVARIANT NoTokenRegression
