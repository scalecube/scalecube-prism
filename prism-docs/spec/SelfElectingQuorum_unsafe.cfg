\* UNSAFE configuration: multi-member reconfiguration (ReconfigDelta = 5 allows any jump).
\* Expected: TLC reports a counterexample to AtMostOneLeader — a configuration jump produces two
\* disjoint majorities, so two owners are each leader under a different config (split-brain).
\* This demonstrates that the single-member rule (overlapping majorities) is load-bearing.
\* Run:  java -cp tla2tools.jar tlc2.TLC SelfElectingQuorum.tla -config SelfElectingQuorum_unsafe.cfg

CONSTANTS
  Nodes = {n1, n2, n3, n4, n5}
  Owners = {a, b}
  NONE = NONE
  MaxEpoch = 3
  MinQuorum = 3
  ReconfigDelta = 5
  LeaderDriven = TRUE

SPECIFICATION Spec

INVARIANT TypeOK
INVARIANT AtMostOneLeader
INVARIANT NoTokenRegression
